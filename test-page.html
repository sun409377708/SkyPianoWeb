<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test</title>
</head>
<body>
  <h1>如果你能看到这个，说明服务器工作正常</h1>
  <script>
    console.log('Test page loaded');
    fetch('http://localhost:3000')
      .then(r => r.text())
      .then(html => {
        console.log('Main page HTML length:', html.length);
        console.log('Contains #app:', html.includes('id="app"'));
      });
  </script>
</body>
</html>
